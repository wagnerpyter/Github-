<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>wagnerpyter index</title>
<style>
body{
  font-family: monospace;
  background:#111;
  color:#ddd;
  padding:40px;
}
a{color:#7df;text-decoration:none}
a:hover{text-decoration:underline}
</style>
</head>

<body>

<h2>files</h2>
<ul id="repo"></ul>

<script>

const repo = "https://api.github.com/repos/wagnerpyter/wagnerpyter/contents";

fetch(repo)
.then(r => r.json())
.then(files => {

  const list = document.getElementById("repo");

  files.forEach(file => {

    if(file.type === "file"){

      const li = document.createElement("li");
      const a = document.createElement("a");

      a.href = file.name;
      a.textContent = file.name;

      li.appendChild(a);
      list.appendChild(li);

    }

  });

});

</script>

</body>

</html>
