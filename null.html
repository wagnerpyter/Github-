<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL_DE_ROTAS_CENTRO</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #terminal {
            width: 80%;
            height: 70%;
            background: rgba(0, 20, 0, 0.9);
            border: 1px solid #00ff41;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            overflow-y: auto;
            position: relative;
        }

        .hop {
            margin-bottom: 5px;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        .highlight { color: #fff; font-weight: bold; }
        .danger { color: #ff3e3e; }
        .limbo { color: #bc00ff; text-shadow: 0 0 8px #bc00ff; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #00ff41;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        h2 { text-transform: uppercase; letter-spacing: 5px; }
    </style>
</head>
<body>

    <h2>Tracing Route to: CENTRE_OF_WORLD (0.0.0.0)</h2>
    <div id="terminal">
        <div id="output"></div>
        <span class="cursor"></span>
    </div>

    <script>
        const output = document.getElementById('output');
        const routes = [
            { hop: 1, ip: "192.168.1.1", desc: "Gateway Local (Seu Roteador)", ms: "1ms" },
            { hop: 2, ip: "10.0.0.1", desc: "Edge do Provedor (ISP)", ms: "12ms" },
            { hop: 3, ip: "187.16.22.4", desc: "IXP São Paulo (Ponto de Troca)", ms: "24ms" },
            { hop: 4, ip: "200.147.0.1", desc: "Saída Internacional (Cabo Submarino Monet)", ms: "89ms" },
            { hop: 5, ip: "142.250.217.110", desc: "Ashburn, Virginia (Data Center Hub)", ms: "115ms" },
            { hop: 6, ip: "??? . ??? . ???", desc: "Divergência de Protocolo BGP", ms: "240ms", class: "danger" },
            { hop: 7, ip: "NULL_VOID", desc: "Entrada no Limbo (Dados Apagados)", ms: "0ms", class: "limbo" },
            { hop: 8, ip: "0.0.0.0", desc: "O CENTRO DO MUNDO", ms: "∞", class: "limbo" }
        ];

        let i = 0;
        function printRoute() {
            if (i < routes.length) {
                const r = routes[i];
                const div = document.createElement('div');
                div.className = 'hop ' + (r.class || '');
                div.innerHTML = `<span>[${r.hop}]</span> <span class="highlight">${r.ip}</span> - ${r.desc} <span class="highlight">(${r.ms})</span>`;
                output.appendChild(div);
                i++;
                setTimeout(printRoute, 1200);
            } else {
                const final = document.createElement('div');
                final.innerHTML = "<br>*** CONEXÃO ESTABELECIDA COM O ARQUIVO MORTO ***";
                output.appendChild(final);
            }
        }

        printRoute();
    </script>
</body>
</html>
